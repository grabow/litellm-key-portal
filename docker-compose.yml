services:
  db:
    image: postgres:18.3
    container_name: portal-db
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5433:5432"
    volumes:
      - portal_pg_18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  portal_pg_18:
